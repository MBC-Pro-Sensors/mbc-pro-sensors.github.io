<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>MBC-Pro-Sensors 文檔中心</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  <style>
    /* 引入 Theme 2 的圓潤字體 Nunito，以及 Theme 1 標題愛用的 Orbitron */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Orbitron:wght@500;700&display=swap');
    
    :root { 
      --theme-color: #0ABAB5; /* Theme 1: 蒂芬妮綠 */
      --accent-color: #F2C200; /* Theme 2: SPIKE 螢光黃 */
    }
    
    /* 融合: Theme 1 的深空黑底色 + Theme 2 的現代字體 */
    body { background: #050a10; font-family: 'Nunito', 'Segoe UI', Tahoma, sans-serif; }
    
    /* 融合: 側邊欄保持 Theme 1 實驗室風格 */
    .sidebar { background: #0a111a; border-right: 1px solid rgba(10,186,181,0.2); }
    .sidebar>h1 a { color: var(--theme-color); font-weight: bold; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
    
    /* 融合: 滑鼠游標經過時，用 Theme 2 的高對比跳色 */
    .sidebar ul li a:hover { color: var(--accent-color); text-decoration: none; text-shadow: 0 0 8px rgba(242,194,0,0.5); }
    .sidebar ul li.active>a { color: var(--theme-color); font-weight: bold; border-right: 3px solid var(--theme-color); }

    /* 融合: Theme 1 的發光標題 */
    .markdown-section h1, .markdown-section h2 { 
      color: var(--theme-color); 
      text-shadow: 0 0 10px rgba(10,186,181,0.3); 
    }
    
    /* 融合: Theme 2 的圓角引言與撞色設計 (使用 SPIKE 的黃色來做醒目提示) */
    .markdown-section blockquote { 
      border-left: 4px solid var(--accent-color); 
      background: rgba(242,194,0,0.08); 
      border-radius: 0 8px 8px 0; 
      color: #ddd;
    }
    
    /* 融合: Theme 2 的圓潤程式碼區塊 + Theme 1 的配色 */
    .markdown-section code { 
      background: rgba(10,186,181,0.1); 
      color: var(--theme-color); 
      border-radius: 6px; 
      padding: 3px 6px;
    }
    
    .markdown-section pre { 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      border: 1px solid rgba(10,186,181,0.2);
    }
    
    /* 讓表格也更有科技感與圓潤度 */
    .markdown-section table th {
      background: rgba(10,186,181,0.15);
      color: var(--theme-color);
      border-radius: 4px;
      border: none;
    }
    .markdown-section table td { border-bottom: 1px solid rgba(255,255,255,0.05); }

    /* --- 側邊欄摺疊功能 CSS --- */
    .sidebar-nav li { margin-bottom: 5px; line-height: 1.5; }
    .sidebar-nav li.closed > ul { display: none; }
    .sidebar-nav li .menu-toggle { cursor: pointer; position: relative; padding-right: 20px; user-select: none; transition: 0.2s; display: block; padding: 4px 0; }
    .sidebar-nav li .menu-toggle:hover { color: var(--accent-color); text-shadow: 0 0 8px rgba(242,194,0,0.5); }
    .sidebar-nav li.has-children > .menu-toggle::after {
      content: '▼'; font-size: 10px; position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); transition: transform 0.3s; color: #666;
    }
    .sidebar-nav li.has-children.closed > .menu-toggle::after { transform: translateY(-50%) rotate(-90deg); }
    /* --- 搜尋列客製化 CSS --- */
    .search { margin-bottom: 20px !important; }
    .search input {
      background-color: rgba(10,186,181,0.1) !important;
      border: 1px solid rgba(10,186,181,0.3) !important;
      border-radius: 20px !important;
      color: var(--theme-color) !important;
      padding: 8px 15px !important;
    }
    .search input:focus {
      box-shadow: 0 0 10px rgba(10,186,181,0.5) !important;
      outline: none !important;
    }
    .search .clear-button { cursor: pointer !important; }
    .search .matching-post {
      border-bottom: 1px solid rgba(10,186,181,0.2) !important;
    }

    /* --- 環境導覽 Hub 按鈕 CSS --- */
    .env-hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .env-card {
      background: rgba(10, 17, 26, 0.8);
      border: 1px solid rgba(10, 186, 181, 0.2);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .env-card:hover {
      transform: translateY(-5px);
      border-color: var(--theme-color);
      box-shadow: 0 10px 25px rgba(10, 186, 181, 0.2);
      background: rgba(10, 186, 181, 0.05);
    }
    .env-card.spike:hover {
      border-color: var(--accent-color);
      box-shadow: 0 10px 25px rgba(242, 194, 0, 0.15);
      background: rgba(242, 194, 0, 0.05);
    }
    .env-card.mcu:hover {
      border-color: #00d2ff;
      box-shadow: 0 10px 25px rgba(0, 210, 255, 0.15);
      background: rgba(0, 210, 255, 0.05);
    }
    .env-card h3 {
      margin: 0 0 10px 0 !important;
      font-size: 1.2rem;
      color: #fff;
    }
    .env-card.spike h3 { color: var(--accent-color); }
    .env-card.ev3 h3 { color: var(--theme-color); }
    .env-card.mcu h3 { color: #00d2ff; }
    .env-card p {
      margin: 0;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="app">正在加載文檔...</div>
  <script>
    window.$docsify = {
      name: 'MBC-Pro-Sensors',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0, /* 關閉頁面內文的標題自動生成選單，保持側邊欄乾淨 */
      auto2top: true,
      themeColor: '#0ABAB5',
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: '🔍 搜尋文件',
        noData: '😞 找不到結果',
        depth: 4,
        hideOtherSidebarContent: false
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            var sidebarNav = document.querySelector('.sidebar-nav');
            if (!sidebarNav) return;
            
            // 找出所有包含子選單的 <li>
            var listItems = sidebarNav.querySelectorAll('li');
            listItems.forEach(function(li) {
              var ul = li.querySelector('ul');
              
              if (ul) {
                // 如果沒有初始化過，加上 class 和點擊事件
                if (!li.classList.contains('has-children')) {
                  li.classList.add('has-children');
                  
                  // 將 <ul> 之前的所有內容包進一個 div.menu-toggle 中
                  var toggleDiv = document.createElement('div');
                  toggleDiv.className = 'menu-toggle';
                  
                  while (li.firstChild && li.firstChild !== ul) {
                    toggleDiv.appendChild(li.firstChild);
                  }
                  li.insertBefore(toggleDiv, ul);
                  
                  toggleDiv.onclick = function(e) {
                    if (e.target.tagName !== 'A') {
                      e.preventDefault();
                    }
                    // 點擊時切換展開/收起
                    li.classList.toggle('closed');
                  };
                }
                
                // 預設將所有選單收起
                li.classList.add('closed');
                
                // 如果這個選單裡面有目前正在看的頁面，就自動展開它
                if (li.querySelector('a.active')) {
                  li.classList.remove('closed');
                }
              }
            });
          });
        }
      ]
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search Plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- 語法高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>
